replicaCount: 1

# XDR Proxy configuration for integration test
# This proxy forwards XDR requests from source cluster to destination cluster

proxyConfig:
  service:
    # Clear-text (non-TLS) setup for integration test.
    # Omit `protocol` to use the default (TCP) for XDR from Aerospike servers.
    # Use `protocol: HTTP_2` only when receiving HTTP/2 from connectors (e.g. ESP Outbound).
    port: 8901
    socket-receive-buffer-bytes: 131072
    manage:
      address: 0.0.0.0
      port: 8902
  aerospike:
    # Destination Aerospike cluster endpoint
    seeds:
      - aerocluster-xdr-dst-0-0.aerospike-test.svc.cluster.local:
          port: 3043
    performance:
      max-connections-per-node: 100
      event-loop-size: 15
  logging:
    enable-console-logging: true

# No TLS secrets needed for clear-text (HTTP) connections
# To enable TLS, uncomment and configure:
# proxySecrets:
#   - tls-certs-xdr-proxy
