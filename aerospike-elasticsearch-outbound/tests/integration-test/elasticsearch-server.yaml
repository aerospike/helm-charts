apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-service-dst-config
  namespace: aerospike-test
data:
  elasticsearch.yml: |
    cluster.name: "elasticsearch-service-dst"
    node.name: "elasticsearch-0"
    network.host: 0.0.0.0
    discovery.type: single-node
    xpack.security.enabled: false
    path.data: /usr/share/elasticsearch/data
    path.logs: /usr/share/elasticsearch/logs    

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-service-dst
  namespace: aerospike-test
spec:
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
  clusterIP: None   # headless for StatefulSet

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch-service-dst
  namespace: aerospike-test
spec:
  serviceName: elasticsearch-service-dst
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          env:
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
          ports:
            - containerPort: 9200
              name: http
          volumeMounts:
            - name: config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: config
          configMap:
            name: elasticsearch-service-dst-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi
                  