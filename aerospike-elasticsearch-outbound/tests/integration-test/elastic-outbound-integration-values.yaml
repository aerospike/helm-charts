replicaCount: 1

connectorConfig:
  service:
    address: 0.0.0.0
    port: 8901
    manage:
      address: 0.0.0.0
      port: 8902
    io-threads: 100
    worker-threads: 100
    max-concurrent-requests: 100000

  record-ordering:
    enable: false
    lut-cache-ttl-seconds: 30

  # Aerospike record routing to an Elasticsearch index.
  routing:
    mode: static
    destination: aerospike

  es-client:
    cluster-config:
      type: on-prem
      nodes:
        - host:
            hostname: localhost
            port: 9200

  logging:
    enable-console-logging: true

# Only include TLS secrets if using HTTPS
# connectorSecrets:
#   - tls-certs-elastic
