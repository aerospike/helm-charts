  labels:
    {{- include "aerospike-elastic-outbound.labels" . | nindent 4 }}
data:
  aerospike-elasticsearch-outbound.yml: |-
    {{- include "aerospike-elastic-outbound.connectorConfig" . | nindent 4 }}