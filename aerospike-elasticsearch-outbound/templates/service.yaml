# Headless service for stable DNS entries for the pods.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aerospike-elastic-outbound.fullname" . }}
  labels:
    app: {{ include "aerospike-elastic-outbound.fullname" . }}
    {{- include "aerospike-elastic-outbound.labels" . | nindent 4 }}
spec:
  ports:
  - name: service
    port: {{ include "aerospike-elastic-outbound.servicePort" . }}
  - name: manage
    port: {{ (((.Values.connectorConfig).service).manage).port | default 8902 }}
  clusterIP: None
  selector:
    app: {{ include "aerospike-elastic-outbound.fullname" . }}